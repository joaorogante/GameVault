<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro | GameVault</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--panel:#12121a;--panel2:#1a1a26;--bd:#2a2a3a;--ac:#7c3aed;--ac2:#a855f7;--tx:#e4e4e7;--mt:#8b8b97;--rd:#ef4444;--gn:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:radial-gradient(circle at top right,#31245f 0,#0a0a0f 34%,#0a0a0f 100%);color:var(--tx);font-family:'Outfit',sans-serif;display:grid;place-items:center;padding:24px}
.auth{width:min(460px,100%);background:var(--panel);border:1px solid var(--bd);border-radius:8px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.brand{font-size:31px;font-weight:700;color:#fff;margin-bottom:6px}
.brand span{color:var(--ac2)}
.sub{color:var(--mt);font-size:14px;margin-bottom:24px}
label{display:block;color:var(--mt);font-size:13px;margin:14px 0 6px}
input{width:100%;height:44px;border-radius:8px;border:1px solid var(--bd);background:var(--panel2);color:var(--tx);padding:0 13px;font:inherit;outline:none}
input:focus{border-color:var(--ac)}
.btn{width:100%;height:44px;border:0;border-radius:8px;background:var(--ac);color:#fff;font:inherit;font-weight:600;cursor:pointer;margin-top:18px}
.btn:hover{background:var(--ac2)}
.link{display:block;text-align:center;margin-top:18px;color:var(--mt);font-size:14px;text-decoration:none}
.link strong{color:var(--tx)}
.msg{min-height:20px;margin-top:14px;color:var(--rd);font-size:13px;text-align:center}
.msg.ok{color:var(--gn)}
</style>
</head>
<body>
<main class="auth">
  <div class="brand">Game<span>Vault</span></div>
  <p class="sub">Crie sua conta para acessar o catálogo e participar da comunidade.</p>
  <form id="signupForm">
    <label for="name">Nome</label>
    <input id="name" autocomplete="name" required>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" required>
    <label for="password">Senha</label>
    <input id="password" type="password" autocomplete="new-password" required>
    <label for="avatar">Avatar URL opcional</label>
    <input id="avatar" type="url" autocomplete="url">
    <button class="btn" type="submit">Cadastrar</button>
    <p id="msg" class="msg"></p>
  </form>
  <a class="link" href="index.html">Já tem conta? <strong>Entrar</strong></a>
</main>
<script>
const A='http://localhost:3000/api';

document.getElementById('signupForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const msg=document.getElementById('msg');
  msg.className='msg';
  msg.textContent='';
  const data={
    name:document.getElementById('name').value.trim(),
    email:document.getElementById('email').value.trim(),
    password:document.getElementById('password').value,
    avatar_url:document.getElementById('avatar').value.trim()
  };
  try{
    const res=await fetch(A+'/users',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
    const json=await res.json();
    if(!res.ok) throw new Error(json.error||'Nao foi possivel cadastrar');
    localStorage.setItem('gamevault_user',JSON.stringify(json));
    msg.className='msg ok';
    msg.textContent='Cadastro criado. Abrindo o painel...';
    setTimeout(()=>window.location.href='app.html',500);
  }catch(err){
    msg.textContent=err.message||'Erro ao conectar com a API';
  }
});
</script>
</body>
</html>
